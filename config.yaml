# config.yaml — central project configuration

project:
  name: "lol-draft-recommendation"
  version: "0.1.0"
  random_seed: 42

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  # Number of champions in the game (update as patches release)
  num_champions: 165
  # Standard draft positions
  roles: ["TOP", "JUNGLE", "MID", "ADC", "SUPPORT"]
  # Max picks + bans per side
  picks_per_team: 5
  bans_per_team: 5

features:
  embedding_dim: 64          # champion embedding size
  use_role_encoding: true
  use_synergy_matrix: true
  use_counter_matrix: true

model:
  baseline:
    type: "random_forest"
    n_estimators: 250
    max_depth: 14
    max_samples: 0.80
  neural:
    type: "mlp"
    hidden_dims: [256, 128, 64]
    dropout: 0.25
    learning_rate: 0.0015
    batch_size: 1024
    epochs: 30
  transformer:
    type: "transformer"
    d_model: 96
    nhead: 4
    num_layers: 2
    dim_feedforward: 192
    dropout: 0.15
    learning_rate: 0.0005
    batch_size: 1024
    epochs: 60
  win_predictor:
    type: "transformer"
    d_model: 128
    nhead: 4
    num_layers: 3
    dim_feedforward: 256
    dropout: 0.10
    learning_rate: 0.005
    batch_size: 128
    epochs: 30

training:
  val_split: 0.15
  test_split: 0.15
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0001
  num_workers: 4
  pin_memory: true
  model_save_dir: "models"

evaluation:
  top_k: [1, 3, 5]           # top-k accuracy metrics
  metrics: ["accuracy", "ndcg", "mrr"]

api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  log_level: "info"

mlflow:
  tracking_uri: "mlruns"
  experiment_name: "draft-recommendation"
